<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNCER ZEKA - V21 PROTOCOL</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://js.puter.com/v2/"></script>

    <style>
        :root { --accent: #00fbff; --warn: #ff3c00; --glow: 0 0 20px rgba(0, 251, 255, 0.6); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        
        #bg-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1; filter: brightness(0.4); }
        
        #loader { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        .btn-start { padding: 18px 50px; border: 2px solid white; background: none; color: white; font-weight: bold; cursor: pointer; border-radius: 10px; letter-spacing: 2px; }

        /* HUD Göstergeleri */
        .window { position: absolute; z-index: 10; padding: 15px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; backdrop-filter: blur(10px); visibility: hidden; opacity: 0; transition: 0.4s; }
        .window.active { visibility: visible; opacity: 1; border-color: var(--accent); box-shadow: var(--glow); }

        #win-harita { top: 50%; left: 50%; margin-left: -150px; margin-top: -150px; width: 300px; height: 300px; border-radius: 50%; overflow: hidden; border: 2px solid var(--accent); }
        
        /* Durum Panelleri */
        .status-panel { position: fixed; left: 30px; bottom: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 15; }
        .indicator { width: 60px; height: 60px; border: 2px solid #333; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 10px; text-align: center; transition: 0.3s; background: rgba(0,0,0,0.6); }
        .indicator.on { border-color: var(--accent); color: var(--accent); box-shadow: var(--glow); }
        .indicator.fire { border-color: var(--warn); color: var(--warn); box-shadow: 0 0 20px var(--warn); }

        #ai-status { position: fixed; bottom: 30px; width: 100%; text-align: center; z-index: 20; }
        .wave-bar { display: inline-block; width: 4px; height: 10px; background: var(--accent); margin: 0 3px; border-radius: 5px; }
        .speaking { animation: wave 0.4s infinite alternate; }
        @keyframes wave { from { height: 10px; } to { height: 40px; background: #fff; } }
        #log { margin-top:10px; font-size:12px; font-weight: bold; color: var(--accent); letter-spacing: 1px; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="loader">
        <h1 style="letter-spacing: 12px; font-weight: 300;">TUNCER <span style="color:var(--accent)">ZEKA</span></h1>
        <button class="btn-start" onclick="initSystem()">PROTOKOLÜ BAŞLAT</button>
    </div>

    <div class="status-panel">
        <div id="ind-glove" class="indicator">ELDİVEN<br>KAPALI</div>
        <div id="ind-itici" class="indicator">İTİCİ<br>OFF</div>
        <div id="ind-ates" class="indicator">ATEŞ<br>READY</div>
    </div>

    <div id="win-harita" class="window"></div>

    <div id="ai-status">
        <div id="waves"><span class="wave-bar"></span><span class="wave-bar"></span><span class="wave-bar"></span><span class="wave-bar"></span></div>
        <div id="log">SİSTEM HAZIR...</div>
    </div>

    <script>
        let port, writer, recognition, iticiAcik = false;
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        let particles = [];

        async function initSystem() {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 9600 });
                writer = port.writable.getWriter();
            } catch (e) { console.warn("Arduino Bağlantısı Yok."); }

            document.getElementById('loader').style.display = "none";
            
            setupParticles();
            animate();
            startVoiceControl();
            sesliKonus("Tuncer Zeka V21 aktif. İtici ve ateşleme sistemleri yetkilendirildi.");
        }

        async function sendArduino(cmd) {
            if (writer) {
                const data = new TextEncoder().encode(cmd + "\n");
                await writer.write(data);
            }
        }

        function startVoiceControl() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new Speech();
            recognition.lang = 'tr-TR';
            recognition.continuous = true;

            recognition.onresult = async (e) => {
                const text = e.results[e.results.length - 1][0].transcript.toLowerCase();
                document.getElementById('log').innerText = text.toUpperCase();

                if (text.includes("tuncer")) {
                    setWaves(true);
                    
                    // --- KOMUTLAR ---
                    if (text.includes("eldiveni aç")) {
                        await sendArduino("E_AC");
                        updateUI('ind-glove', 'on', 'ELDİVEN<br>AÇIK');
                        sesliKonus("Eldiven birimi açıldı.");
                    } 
                    else if (text.includes("eldiveni kapat")) {
                        await sendArduino("E_KAPAT");
                        updateUI('ind-glove', '', 'ELDİVEN<br>KAPALI');
                        sesliKonus("Eldiven birimi kapatıldı.");
                    }
                    else if (text.includes("iticiyi aç")) {
                        await sendArduino("I_AC");
                        iticiAcik = true;
                        updateUI('ind-itici', 'on', 'İTİCİ<br>MAX');
                        sesliKonus("İtici tam güçte çalışıyor patron.");
                    }
                    else if (text.includes("iticiyi kapat")) {
                        await sendArduino("I_KAPAT");
                        iticiAcik = false;
                        updateUI('ind-itici', '', 'İTİCİ<br>OFF');
                        updateUI('ind-ates', '', 'ATEŞ<br>READY');
                        sesliKonus("İtici ve ateşleme sistemleri dev dışı.");
                    }
                    else if (text.includes("ateş")) {
                        if(iticiAcik) {
                            await sendArduino("FIRE");
                            updateUI('ind-ates', 'fire', 'ATEŞLENDİ');
                            sesliKonus("Ateşleme gerçekleştirildi!");
                        } else {
                            sesliKonus("Önce iticiyi açmalısınız patron.");
                        }
                    }
                    else if (text.includes("harita")) {
                        document.getElementById('win-harita').classList.toggle('active');
                        sesliKonus("Navigasyon verileri yükleniyor.");
                    }
                    else {
                        const res = await puter.ai.chat(`Sen Tuncer Zeka'sın. Komut: ${text}. Çok kısa cevap ver.`);
                        sesliKonus(res.toString());
                    }
                    setWaves(false);
                }
            };
            recognition.onend = () => recognition.start();
            recognition.start();
        }

        function updateUI(id, cls, html) {
            const el = document.getElementById(id);
            el.className = 'indicator ' + cls;
            el.innerHTML = html;
        }

        function sesliKonus(m) {
            const u = new SpeechSynthesisUtterance(m);
            u.lang = 'tr-TR';
            u.onstart = () => recognition.stop();
            u.onend = () => recognition.start();
            window.speechSynthesis.speak(u);
        }

        function setWaves(active) { document.querySelectorAll('.wave-bar').forEach(w => active ? w.classList.add('speaking') : w.classList.remove('speaking')); }

        // --- ARKA PLAN ANİMASYONU ---
        function setupParticles() {
            bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight;
            for(let i=0; i<80; i++) particles.push({x: Math.random()*bgCanvas.width, y: Math.random()*bgCanvas.height, vx: Math.random()-0.5, vy: Math.random()-0.5});
        }
        function animate() {
            bgCtx.clearRect(0,0,bgCanvas.width, bgCanvas.height);
            bgCtx.fillStyle = "#00fbff";
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0 || p.x>bgCanvas.width) p.vx *= -1;
                if(p.y<0 || p.y>bgCanvas.height) p.vy *= -1;
                bgCtx.beginPath(); bgCtx.arc(p.x, p.y, 1.5, 0, Math.PI*2); bgCtx.fill();
            });
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
