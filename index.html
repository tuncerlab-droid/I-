<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Hesap Makinesi</title>
<style>
  body{font-family: Arial, sans-serif;background:#f0f0f0;display:flex;justify-content:center;align-items:center;height:100vh;}
  .calculator{background:#fff;padding:20px;border-radius:8px;box-shadow:0 4px 10px rgba(0,0,0,.1);}
  input, select{width:100%;padding:10px;margin:5px 0;font-size:1.1rem;}
  button{padding:10px 15px;font-size:1rem;margin-top:10px;background:#007bff;color:#fff;border:none;border-radius:4px;}
  button:hover{background:#0056b3;}
  .result{margin-top:15px;font-size:1.2rem;color:#333;}
</style>
</head>
<body><div class="calculator">  <input id="a" type="number" placeholder="Birinci sayı" />  <input id="b" type="number" placeholder="İkinci sayı" />  <select id="operation">    <option value="+">Toplama (+)</option>    <option value="-">Çıkarma (-)</option>    <option value="">Çarpma ()</option>    <option value="/">Bölme (/)</option>  </select>  <button id="calcBtn">Hesapla</button>  <div class="result" id="result"></div></div><script>document.getElementById('calcBtn').addEventListener('click', () => {  const a = parseFloat(document.getElementById('a').value);  const b = parseFloat(document.getElementById('b').value);  const op = document.getElementById('operation').value;  let res;  if (isNaN(a) || isNaN(b)) {    res = 'Lütfen geçerli sayılar girin.';  } else {    switch(op) {      case '+': res = a + b; break;      case '-': res = a - b; break;      case '': res = a  b; break;      case '/': res = b === 0 ? 'Sıfıra bölme hatası!' : a / b; break;      default: res = 'Bilinmeyen işlem';    }  }  document.getElementById('result').textContent = Sonuç: ${res};});</script></body></html>
