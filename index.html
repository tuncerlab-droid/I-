<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUNCER ZEKA - PRO OS v4.7</title>
    
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <style>
        :root {
            --neon-color: #00f0ff; 
            --dark-bg: #0a0a0a;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--dark-bg);
            color: #e0e0e0;
            font-family: 'Segoe UI', 'Courier New', monospace;
            overflow: hidden;
        }

        /* BOOT SCREEN */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: transform 1s cubic-bezier(0.7, 0, 0.3, 1);
        }
        #terminal-loader {
            position: absolute; top: 20px; left: 20px; width: 300px; height: 400px;
            font-family: monospace; font-size: 10px; color: var(--neon-color); overflow: hidden; opacity: 0.7;
        }
        #central-logo { text-align: center; }
        #central-logo h1 { font-size: 42px; margin: 0; letter-spacing: 8px; color: #fff; text-shadow: 0 0 20px var(--neon-color); }

        /* KAMERA ARAYÜZÜ */
        #kamera-arayuzu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 5000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        .kamera-kapsayici {
            position: relative; width: 320px; height: 240px;
            border: 2px solid var(--neon-color); border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.3); overflow: hidden;
        }
        #video-element { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .hud-scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: var(--neon-color); box-shadow: 0 0 10px var(--neon-color);
            animation: radar-scan 2s linear infinite;
        }
        @keyframes radar-scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        /* MAIN UI */
        #main-ui {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }
        #ust-panel {
            position: absolute; top: 20px; width: 90%;
            display: flex; justify-content: space-between; align-items: center;
        }
        .etiket { font-size: 11px; color: var(--neon-color); letter-spacing: 2px; }
        .mod-btn {
            background: #222; border: 1px solid var(--neon-color); color: var(--neon-color); padding: 8px 15px;
            font-size: 11px; cursor: pointer; border-radius: 4px; margin-left: 5px;
        }
        .mod-btn.aktif { background: var(--neon-color); color: #000; box-shadow: 0 0 15px var(--neon-color); }

        #hud-container { width: 150px; height: 150px; position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        #outer-ring {
            position: absolute; width: 100%; height: 100%; border: 2px solid rgba(0, 240, 255, 0.2);
            border-top: 2px solid var(--neon-color); border-bottom: 2px solid var(--neon-color); border-radius: 50%;
            animation: spin 4s linear infinite;
        }
        #core { width: 60px; height: 60px; background: radial-gradient(circle, var(--neon-color) 10%, #005577 60%, #000 100%); border-radius: 50%; box-shadow: 0 0 20px var(--neon-color); }
        .kilitli #core { background: #550000; box-shadow: 0 0 30px red; border: 1px solid red; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #sohbet-kutusu {
            width: 80%; max-width: 700px; height: 20vh; border: 1px solid var(--neon-color); background: rgba(0,0,0,0.6);
            padding: 20px; overflow-y: auto; border-radius: 8px; margin-bottom: 15px; font-size: 14px;
        }
        #harita-wrapper { width: 80%; max-width: 700px; height: 35vh; margin-bottom: 15px; display: none; }
        #harita-alani { width: 100%; height: 100%; border-radius: 8px; border: 1px solid var(--neon-color); }

        .yapay-zeka { color: var(--neon-color); font-weight: bold; }
        .sen { color: #aaa; text-align: right; margin-bottom: 10px; }
        #komut-btn { background: var(--neon-color); color: #000; border: none; padding: 12px 40px; font-size: 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="boot-screen">
        <div id="terminal-loader"></div>
        <div id="central-logo"><h1>TUNCER</h1><p>INDUSTRIES - PRO OS v4.7</p></div>
    </div>

    <div id="kamera-arayuzu">
        <div class="kamera-kapsayici">
            <video id="video-element" autoplay muted></video>
            <div class="hud-scan-line"></div>
        </div>
        <div id="kamera-metni">KİMLİK DOĞRULANIYOR...</div>
    </div>

    <div id="main-ui">
        <div id="ust-panel">
            <div class="etiket" id="sistem-durum-etiketi">SİSTEM DURUMU: UYKU MODU</div>
            <div style="display:flex; align-items:center;">
                <button id="btn-arduino" class="mod-btn" onclick="arduinoBaglan()">DONANIM BAĞLA</button>
                <div style="margin-left: 20px;">
                    <button id="btn-manuel" class="mod-btn aktif" onclick="modDegistir('manuel')">MANUEL</button>
                    <button id="btn-oto" class="mod-btn" onclick="modDegistir('oto')">OTOMATİK</button>
                </div>
            </div>
        </div>

        <div id="hud-container" class="kilitli">
            <div id="outer-ring"></div>
            <div id="core"></div>
        </div>
        
        <div id="harita-wrapper"><div id="harita-alani"></div></div>

        <div id="sohbet-kutusu">
            <div class="mesaj yapay-zeka">Tuncer Zeka: Güvenlik protokolleri v4.7 aktif. Kimlik doğrulaması için sistemi başlatın.</div>
        </div>

        <button id="komut-btn" onclick="manuelDinle()">DİNLE</button>
        <div id="durum-metni" style="margin-top:10px; color:var(--neon-color); font-size:11px; opacity:0.6;">Beklemede</div>
    </div>

    <script>
        const sohbet = document.getElementById("sohbet-kutusu");
        const haritaWrapper = document.getElementById("harita-wrapper");
        const hud = document.getElementById("hud-container");
        const statusLabel = document.getElementById("sistem-durum-etiketi");
        const video = document.getElementById("video-element");
        const kameraArayuzu = document.getElementById("kamera-arayuzu");
        const kameraMetni = document.getElementById("kamera-metni");

        let port, writer, map, routingControl;
        let sistemAktif = false;
        let aktifMod = 'manuel';
        let faceMatcher = null;
        let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'tr-TR';

        // --- GÜVENLİK AYARI ---
        const GUVENLIK_HASSASIYETI = 0.35; // Eskisi 0.55 idi. 0.35 çok daha sıkı bir eşleşme ister.

        async function initAI() {
            const modelUrl = 'https://justadudewhohacks.github.io/face-api.js/models';
            await faceapi.nets.ssdMobilenetv1.loadFromUri(modelUrl);
            await faceapi.nets.faceLandmark68Net.loadFromUri(modelUrl);
            await faceapi.nets.faceRecognitionNet.loadFromUri(modelUrl);
            
            const saved = localStorage.getItem("tuncer_face_secure");
            if (saved) {
                const desc = new Float32Array(JSON.parse(saved));
                faceMatcher = new faceapi.FaceMatcher(new faceapi.LabeledFaceDescriptors("Ahmet Tuncer", [desc]), GUVENLIK_HASSASIYETI);
            } else {
                setTimeout(yuzKaydet, 2000);
            }
        }

        async function yuzKaydet() {
            kameraArayuzu.style.display = 'flex';
            kameraMetni.innerText = "YENİ YETKİLİ KAYDEDİLİYOR...";
            const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
            video.srcObject = stream;

            const scan = setInterval(async () => {
                const detect = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
                if (detect) {
                    clearInterval(scan);
                    localStorage.setItem("tuncer_face_secure", JSON.stringify(Array.from(detect.descriptor)));
                    faceMatcher = new faceapi.FaceMatcher(new faceapi.LabeledFaceDescriptors("Ahmet Tuncer", [detect.descriptor]), GUVENLIK_HASSASIYETI);
                    stream.getTracks().forEach(t => t.stop());
                    kameraArayuzu.style.display = 'none';
                    sesliKonus("Profil başarıyla oluşturuldu patron.");
                }
            }, 1000);
        }

        async function dogrula() {
            if (!faceMatcher) return;
            kameraArayuzu.style.display = 'flex';
            const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
            video.srcObject = stream;

            let checkCount = 0;
            const scan = setInterval(async () => {
                checkCount++;
                const detect = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
                if (detect) {
                    const match = faceMatcher.findBestMatch(detect.descriptor);
                    // KRİTİK DÜZELTME: Sadece Ahmet Tuncer ve belirtilen hassasiyetin altındaysa aç
                    if (match.label === "Ahmet Tuncer" && match.distance < GUVENLIK_HASSASIYETI) {
                        clearInterval(scan);
                        stream.getTracks().forEach(t => t.stop());
                        kameraArayuzu.style.display = 'none';
                        sistemiAc();
                    } else if (match.label === "unknown" || match.distance >= GUVENLIK_HASSASIYETI) {
                        if (checkCount > 10) {
                            clearInterval(scan);
                            stream.getTracks().forEach(t => t.stop());
                            kameraArayuzu.style.display = 'none';
                            sesliKonus("Erişim reddedildi. Biyometrik veri uyuşmuyor.");
                        }
                    }
                }
                if(checkCount > 20) { clearInterval(scan); stream.getTracks().forEach(t => t.stop()); kameraArayuzu.style.display = 'none'; }
            }, 600);
        }

        function sistemiAc() {
            sistemAktif = true;
            hud.classList.remove("kilitli");
            statusLabel.innerText = "SİSTEM DURUMU: AKTİF";
            arduinoKomutGonder("POWER_ON");
            sesliKonus("Hoşgeldiniz Ahmet Tuncer. Bütün sistemler çevrimiçi.");
            ekranaYaz("Tuncer Zeka", "Erişim Onaylandı.");
        }

        async function arduinoBaglan() {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 9600 });
                const encoder = new TextEncoderStream();
                encoder.readable.pipeTo(port.writable);
                writer = encoder.writable.getWriter();
                sesliKonus("Donanım bağlandı.");
            } catch (e) {}
        }

        async function arduinoKomutGonder(c) { if(writer) await writer.write(c + "\n"); }

        function modDegistir(m) { aktifMod = m; document.querySelectorAll('.mod-btn').forEach(b => b.classList.remove('aktif')); event.target.classList.add('aktif'); if(m === 'oto') otoDinle(); }
        function manuelDinle() { try { recognition.start(); } catch(e){} }
        function otoDinle() { if(aktifMod === 'oto') try { recognition.start(); } catch(e){} }

        recognition.onresult = async (e) => {
            const t = e.results[0][0].transcript.toLowerCase();
            ekranaYaz("Sen", t);
            if (t.includes("sistemi başlat") || t.includes("uyan")) {
                dogrula();
            } else if (sistemAktif) {
                // Temel komutlar
                if(t.includes("ışıkları aç")) arduinoKomutGonder("LIGHTS_ON");
                if(t.includes("kaskı aç")) arduinoKomutGonder("HELMET_90");
                if(t.includes("haritayı aç")) { haritaWrapper.style.display = 'block'; }
                
                // AI Cevap
                const res = await puter.ai.chat(t);
                ekranaYaz("Tuncer Zeka", res);
                sesliKonus(res);
            } else {
                sesliKonus("Sistem kilitli patron.");
            }
        };

        recognition.onend = () => { if(aktifMod === 'oto') setTimeout(otoDinle, 400); };

        function ekranaYaz(k, m) { sohbet.innerHTML += `<div><b class="yapay-zeka">${k}:</b> ${m}</div>`; sohbet.scrollTop = sohbet.scrollHeight; }
        function sesliKonus(m) { const u = new SpeechSynthesisUtterance(m); u.lang = 'tr-TR'; window.speechSynthesis.speak(u); }

        window.onload = () => {
            let i = 0; const logs = ["> KERNEL INIT", "> SECURE PROTOCOL 4.7", "> READY."];
            const t = setInterval(() => {
                if(i < logs.length) document.getElementById("terminal-loader").innerHTML += logs[i++] + "<br>";
                else { clearInterval(t); document.getElementById("boot-screen").style.transform = "translateY(-100%)"; initAI(); }
            }, 400);
        };
    </script>
</body>
</html>
